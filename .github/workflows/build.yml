name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'simple_live_app/**'
      - '.github/workflows/build.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout code
      - uses: actions/checkout@v4
        with:
          ref: master

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'
          cache: true

      # Restore packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # Build APK
      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi

      # Upload APK to Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      - run: echo "This job's status is ${{ job.status }}."
